const storage = (() => {
  let mem = {}; let ok = false;

  return {
    persistent: ok,
    get(key){ try { return ok ? window.localStorage.getItem(key) : (mem[key] ?? null); } catch(e){ return mem[key] ?? null; } },
    set(key,val){ try { ok ? window.localStorage.setItem(key,val) : (mem[key]=val); } catch(e){ mem[key]=val; } },

function toonDatum(iso){ if(!iso) return ''; const [y,m,d] = iso.split('-'); return d+'/'+m+'/'+y; }
function parseNlDatum(s){
  if(!s) return '';
  const m = s.trim().match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
  if(!m) return s;
  const d=m[1], mm=m[2], y=m[3]; const yy = y.length===2 ? '20'+y : y;
  return yy+'-'+mm.padStart(2,'0')+'-'+d.padStart(2,'0');
}
const euro = (n) => (n||n===0) ? '€ ' + Number(n).toLocaleString('nl-BE',{maximumFractionDigits:2}) : '';

// Kostprijs van één aanpassings-regel = materiaal (aankoop) + werkuren × tarief
function rijKost(l){
  const uur = (l.uurtarief===''||l.uurtarief==null) ? UURTARIEF_STD : (Number(l.uurtarief)||0);
  return (Number(l.materiaal)||0) + (Number(l.werkuren)||0) * uur;
}
// Verkoop (offerte) van één aanpassings-regel = materiaal + marge% + werkuren × tarief
function aanpVerkoop(l){
  const uur = (l.uurtarief===''||l.uurtarief==null) ? UURTARIEF_STD : (Number(l.uurtarief)||0);
  return (Number(l.materiaal)||0) * (1 + (Number(l.marge)||0)/100) + (Number(l.werkuren)||0) * uur;
}

// Rendement + facturatie van een werf
function rendement(f){
  const eo = f.eersteOfferte || {};
  const btw = (eo.btw===''||eo.btw==null) ? 21 : (Number(eo.btw)||0);
  const offerteExcl = Number(eo.prijs)||0;
  const uitbreidingenExcl = (f.uitbreidingen||[]).reduce((s,u)=> s + (Number(u.prijs)||0), 0);
  const lijnen = f.aanpassingen || [];
  const aanpVerkoopTot = lijnen.reduce((s,l)=> s + aanpVerkoop(l), 0);   // verkoop van alle aanpassingen

  const omzet    = offerteExcl + uitbreidingenExcl;                     // = projecttotaal excl. BTW (offerte + uitbreidingen)
  const omzetIncl= omzet * (1 + btw/100);                               // projecttotaal incl. BTW

  const materiaal = lijnen.reduce((s,l)=> s + (Number(l.materiaal)||0), 0);              // aankoop (kost)
  const materiaalMetMarge = lijnen.reduce((s,l)=> s + (Number(l.materiaal)||0)*(1+(Number(l.marge)||0)/100), 0);
  const materiaalMarge = materiaalMetMarge - materiaal;                                  // winst op materiaal
  const arbeid    = lijnen.reduce((s,l)=>{ const uur=(l.uurtarief===''||l.uurtarief==null)?UURTARIEF_STD:(Number(l.uurtarief)||0); return s + (Number(l.werkuren)||0)*uur; }, 0);
  const kosten = materiaal + arbeid;

  const winst = omzet - kosten + materiaalMarge;                        // omzet − (materiaal aankoop + uren) + marge op materiaal
  const marge = omzet>0 ? (winst/omzet*100) : 0;

  const voorschottenExcl = (f.voorschotten||[]).reduce((s,v)=> s + (Number(v.bedrag)||0), 0);   // ingevoerd = excl. BTW
  const voorschottenIncl = voorschottenExcl * (1 + btw/100);
  const projecttotaal = omzetIncl;                                       // incl btw
  const rest          = projecttotaal - voorschottenIncl;

  return {btw, offerteExcl, offerteIncl:offerteExcl*(1+btw/100), uitbreidingenExcl, aanpVerkoopTot, omzet, omzetIncl,
          materiaal, materiaalMetMarge, materiaalMarge, arbeid, kosten, winst, marge,
          voorschottenIncl, voorschottenExcl, projecttotaal, rest};
}

// Fichenummer: haal jaar + volgnummer uit "2026-316"
function ficheSeq(nummer){ const m=(nummer||'').toString().trim().match(/^(\d{4})-0*(\d+)$/); return m?{jaar:m[1], seq:parseInt(m[2])}:null; }
function ficheJaar(f){ const s=ficheSeq(f.fichenummer); if(s) return s.jaar; if(f.datumAanvraag) return f.datumAanvraag.slice(0,4); return '—'; }

// Document openen (dataUrl -> blob -> nieuw tabblad; of een http-link)
function dataUrlNaarBlob(dataUrl){
  const [head, b64] = dataUrl.split(',');
  const mime = (head.match(/:(.*?);/)||[])[1] || 'application/octet-stream';
  const bin = atob(b64); const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr], {type:mime});
}
function openDoc(d){
  if(d && d.dataUrl){
    try { const url=URL.createObjectURL(dataUrlNaarBlob(d.dataUrl)); window.open(url,'_blank'); setTimeout(()=>URL.revokeObjectURL(url),60000); }
    catch(e){ window.open(d.dataUrl,'_blank'); }
  } else {
    const link = (d && (d.link||d.naam)) || '';
    if(/^https?:\/\//i.test(link)) window.open(link,'_blank');
    else alert('Dit item bevat geen bestand of geldige link om te openen.');
  }
}

// Afbeelding inlezen + verkleinen (kleiner opslaan in localStorage)
function leesEnVerklein(file, maxDim, cb){
  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.onload = ()=>{
      let w=img.width, h=img.height;
      if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
      else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.72));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function parseCSV(text){
  const rows=[]; let row=[], cur='', q=false;
  const sep = (text.split('\n')[0].split(';').length > text.split('\n')[0].split(',').length) ? ';' : ',';
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"' && text[i+1]==='"'){ cur+='"'; i++; } else if(c==='"'){ q=false; } else cur+=c; }
    else { if(c==='"') q=true; else if(c===sep){ row.push(cur); cur=''; } else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; } else if(c==='\r'){} else cur+=c; }
  }
  if(cur.length||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r => r.some(x => (x||'').trim()!==''));
}
function toCSV(fiches){
  const cols = ['fichenummer','naam','bedrijf','adres','postcode','gemeente','email','telefoon','datumAanvraag','datumShowroom','bron','typeKlant','projecttype','waarde','status','bak','volgendeActie','datumVolgendeActie','reclamebord','googleReview','notities'];
  const extra = ['omzet','materiaal','arbeid','winst','offerteIncl','projecttotaal','voorschotten','rest'];
  const esc = (v)=>{ v=(v==null?'':v).toString(); return /[";\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  const head = [...cols, ...extra].join(';');
  const body = fiches.map(f => {
    const r = rendement(f);
    return [...cols.map(c => esc(f[c])), r.omzet, r.materiaal, r.arbeid, r.winst, Math.round(r.offerteIncl), Math.round(r.projecttotaal), r.voorschottenIncl, Math.round(r.rest)].join(';');
  }).join('\n');
  return head+'\n'+body;
}

function pasStatusToe(fiche, nieuweStatus){
  const f = { ...fiche, status:nieuweStatus };
  f.bak = bakVoorStatus(nieuweStatus);
  const log = (tekst) => { f.historiek = [...(f.historiek||[]), {id:uid(), datum:vandaag(), tekst}]; };
  log('Status → ' + nieuweStatus);
  if (nieuweStatus === 'Offerte verstuurd'){ f.volgendeActie='Reminder sturen (opvolging offerte)'; f.datumVolgendeActie=plusDagen(7); }
  else if (nieuweStatus === 'Reminder sturen'){ f.volgendeActie='Bellen (opvolging reminder)'; f.datumVolgendeActie=plusDagen(3); }
  else if (nieuweStatus === 'Nieuwe aanvraag'){ f.volgendeActie='Startmail sturen'; f.datumVolgendeActie=vandaag(); }
  else if (nieuweStatus === 'Bellen'){ f.volgendeActie='Klant opbellen'; f.datumVolgendeActie=vandaag(); }
  else if (['Gewonnen','Verloren','Afgewerkt'].includes(nieuweStatus)){ f.volgendeActie=''; f.datumVolgendeActie=''; }
  return f;
}

  const r = rendement(fiche);

  return (
    <div ref={ref} draggable
      onDragStart={(e)=>onDragStart(e,fiche)} onDragEnd={onDragEnd} onClick={()=>onOpen(fiche)}

        <span className="font-display font-semibold text-[15px] text-slate-900 truncate flex-1">{fiche.naam || 'Naamloos'}</span>
        <span className="shrink-0 flex items-center gap-1 text-[11px]">
          {fiche.reclamebord && <span title="Reclamebordje meegegeven">🪧</span>}
          {fiche.googleReview && <span title="Google review ok">⭐</span>}
          {(fiche.datumVolgendeActie || fiche.postcode) &&
            <span className="text-slate-500 hidden sm:block font-mono">{fiche.datumVolgendeActie ? toonDatum(fiche.datumVolgendeActie) : fiche.postcode}</span>}
        </span>
      </div>

      {/* DETAIL — enkel wanneer de fiche omhoog komt */}
      {lifted &&
        <div className="px-3 pb-3 pt-1.5 border-t border-black/5">
          <div className="flex gap-3">
            {fiche.foto && <img src={fiche.foto} alt="" className="w-14 h-14 rounded-lg object-cover border border-black/10 shrink-0" />}
            <div className="min-w-0 flex-1">
              {fiche.bedrijf && <div className="text-[12.5px] font-semibold text-slate-700 truncate">{fiche.bedrijf}</div>}
              <div className="text-[12px] text-slate-700 leading-snug space-y-0.5">
                {(fiche.gemeente||fiche.postcode||fiche.adres) && <div className="truncate">📍 {[fiche.adres,[fiche.postcode,fiche.gemeente].filter(Boolean).join(' ')].filter(Boolean).join(', ')}</div>}
                {fiche.email && <div className="truncate">✉ {fiche.email}</div>}
                {fiche.telefoon && <div className="truncate">☎ {fiche.telefoon}</div>}
                {fiche.projecttype && <div className="truncate">🔧 {fiche.projecttype}{fiche.waarde?' · '+euro(fiche.waarde):''}</div>}
              </div>
            </div>
          </div>
          <div className="mt-2 flex items-center gap-1.5 flex-wrap">
            <span className="text-[10px] font-semibold px-1.5 py-0.5 rounded" style={{background:k.hex+'22', color:k.hex}}>{fiche.status}</span>
            {r.omzet>0 &&
              <span className="text-[10px] font-semibold px-1.5 py-0.5 rounded"
                    style={{background:(r.winst>=0?'#25C167':'#EF4444')+'22', color:(r.winst>=0?'#149c4f':'#b91c1c')}}>
                winst {euro(r.winst)} · {r.marge.toFixed(0)}%
              </span>}
            {fiche.volgendeActie && <span className="text-[10px] text-slate-500">⏱ {fiche.volgendeActie}</span>}

    </div>

}

/* =========================================================================
   7. BAK
   ========================================================================= */

function Bak({bak, fiches, matchIds, zoekActief, focusId, firstMatchId, scrollNonce, onOpen, onDropFiche, drag}){
  const [over, setOver] = useState(false);
  const geordend = useMemo(()=>{
    if(!zoekActief) return fiches;
    return [...fiches].sort((a,b)=> (matchIds.has(a.id)?0:1) - (matchIds.has(b.id)?0:1));
  },[fiches, matchIds, zoekActief]);
  const totaalWaarde = fiches.reduce((s,f)=> s + (Number(f.waarde)||0), 0);
  const expand = zoekActief || !!focusId;

  return (
    <section className="flex flex-col min-w-0">
      <header className="flex items-baseline justify-between px-1 mb-2">
        <div>
          <h2 className="font-display font-bold text-white text-base">{bak.titel}</h2>
          <p className="text-[11px] text-slate-500 -mt-0.5">{bak.sub}</p>
        </div>
        <div className="text-right">
          <div className="font-mono text-bts-orange font-semibold text-sm">{fiches.length}</div>
          {totaalWaarde>0 && <div className="text-[10px] text-slate-500">{euro(totaalWaarde)}</div>}
        </div>
      </header>

      <div
        onDragOver={(e)=>{ e.preventDefault(); setOver(true); }}
        onDragLeave={()=>setOver(false)}
        onDrop={(e)=>{ e.preventDefault(); setOver(false); onDropFiche(bak.id); }}
        className={"bak-shell rounded-2xl p-3.5 pt-4 flex-1 min-h-[320px] "+(over?'bak-drop-active':'')}
      >
        <div className="bak-rail h-1.5 rounded-full mb-3 mx-1" />
        <div className={"pr-1 pt-3 "+(expand?'':'scroll-thin overflow-y-auto')}
             style={expand?{}:{maxHeight:'calc(100vh - 300px)'}}>
          {geordend.length===0 &&
            <div className="text-center text-slate-500 text-[13px] py-12 border border-dashed border-slate-700 rounded-xl">Sleep hier een fiche naartoe</div>}
          {geordend.map((f,i) => (
            <FicheCard key={f.id} fiche={f} index={i}
              lifted={zoekActief ? matchIds.has(f.id) : (focusId===f.id)}
              dimmed={zoekActief && !matchIds.has(f.id)}
              scrollNow={zoekActief ? (firstMatchId===f.id) : (focusId===f.id)}
              scrollNonce={scrollNonce}
              dragging={drag.id===f.id}
              onOpen={onOpen} onDragStart={drag.start} onDragEnd={drag.end} />
          ))}
        </div>
      </div>
    </section>
  );
}

  const [nieuweLog, setNieuweLog] = useState('');

  const [zoom, setZoom] = useState(false);

  const undoRef = useRef([]); const lastUndoRef = useRef(0);
  const isNew = !fiche.__bestaat;
  // setF met ingebouwde "ongedaan maken": snapshots (snel typen wordt samengevoegd)
  function setF(updater){
    const now = Date.now();
    if(now - lastUndoRef.current > 500){ undoRef.current = [...undoRef.current.slice(-49), f]; setUndoN(undoRef.current.length); }
    lastUndoRef.current = now;
    _setF(updater);
  }
  function modalUndo(){
    if(!undoRef.current.length) return;
    const prev = undoRef.current[undoRef.current.length-1];
    undoRef.current = undoRef.current.slice(0,-1); setUndoN(undoRef.current.length);
    _setF(prev);
  }
  const set = (k,v) => setF(prev => ({...prev, [k]:v}));
  const r = rendement(f);

  function wijzigStatus(nieuw){ setF(prev => pasStatusToe(prev, nieuw)); }
  const addDoc = (doc)=> setF(prev=>({...prev, documenten:[...(prev.documenten||[]), doc]}));
  function voegLogToe(){ if(!nieuweLog.trim()) return; set('historiek', [...(f.historiek||[]), {id:uid(), datum:vandaag(), tekst:nieuweLog.trim()}]); setNieuweLog(''); }
  const setLog = (id,key,val)=> setF(prev=>({...prev, historiek:(prev.historiek||[]).map(h=> h.id===id ? {...h,[key]:val} : h)}));
  const delLog = (id)=> setF(prev=>({...prev, historiek:(prev.historiek||[]).filter(h=>h.id!==id)}));
  function voegDocToe(){ if(!nieuwDoc.trim()) return; addDoc({id:uid(), naam:nieuwDoc.trim(), link:nieuwDoc.trim(), datum:vandaag()}); setNieuwDoc(''); }
  function bestandToe(e){
    const files=Array.from(e.target.files||[]);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=> addDoc({id:uid(), naam:file.name, datum:vandaag(), grootte:Math.round(file.size/1024)+' kB', type:file.type, dataUrl:ev.target.result});
      reader.readAsDataURL(file);
    });
    e.target.value='';
  }
  function fotoToe(e){ const file=e.target.files[0]; if(!file) return; leesEnVerklein(file, 640, (d)=> set('foto', d)); e.target.value=''; }
  function plakFoto(e){
    const items = (e.clipboardData && e.clipboardData.items) || [];
    for(const it of items){

        const file = it.getAsFile();

  // Aanpassingen — de kosten (materiaal + werkuren), aftrekbaar van de omzet

function VandaagPaneel({fiches, onToonInBak, onOpen}){
  const vd = vandaag();
  const teDoen = fiches
    .filter(f => (f.datumVolgendeActie && f.datumVolgendeActie <= vd) || ['Reminder sturen','Bellen','Offerte maken'].includes(f.status))
    .filter(f => !['Gewonnen','Verloren','Afgewerkt'].includes(f.status))
    .sort((a,b)=> (a.datumVolgendeActie||'9999').localeCompare(b.datumVolgendeActie||'9999'));

  return (
    <div className="bg-bts-panel border border-bts-line rounded-2xl p-4">
      <div className="flex items-center gap-2 mb-3">
        <span className="text-lg">☀️</span><h3 className="font-display font-bold text-white">Vandaag te doen</h3>
        <span className="ml-auto text-xs font-mono px-2 py-0.5 rounded-full bg-bts-orange/20 text-bts-orange">{teDoen.length}</span>
      </div>
      {teDoen.length===0
        ? <p className="text-sm text-slate-500">Niets dringend. Alles onder controle. ✅</p>
        : <ul className="space-y-1.5 max-h-64 overflow-y-auto scroll-thin pr-1">
            {teDoen.map(f=>{
              const laat = f.datumVolgendeActie && f.datumVolgendeActie < vd;
              const bak = BAK_MAP[f.bak||'nieuw'];
              return (
                <li key={f.id} className="flex items-center gap-2 bg-bts-panel2 rounded-lg px-2 py-2">
                  <button onClick={()=>onToonInBak(f)} title="Toon deze fiche in zijn bak" className="flex items-center gap-2 flex-1 min-w-0 text-left">
                    <StatusDot status={f.status} />
                    <span className="min-w-0">
                      <span className="block text-sm text-slate-200 truncate"><b>{f.naam}</b> · {f.volgendeActie || f.status}</span>
                      <span className="block text-[10.5px] text-slate-500 truncate">📦 {bak?bak.titel:'—'}{f.datumVolgendeActie?' · '+(laat?'⚠ ':'')+toonDatum(f.datumVolgendeActie):''}</span>
                    </span>
                  </button>
                  <button onClick={()=>onOpen(f)} title="Open fiche" className="shrink-0 text-xs px-2 py-1 rounded-md border border-bts-line text-slate-300 hover:border-bts-orange hover:text-bts-orange">✏ open</button>
                </li>
              );
            })}
          </ul>}
    </div>
  );
}

/* =========================================================================
   10. HOOFDAPP
   ========================================================================= */

function App(){
  const [fiches, setFiches] = useState(()=>{
    const raw = storage.get(LS_KEY);
    if(raw){ try { return JSON.parse(raw); } catch(e){} }
    return seedData();
  });
  const [zoek, setZoek] = useState('');
  const [modal, setModal] = useState(null);
  const [filters, setFilters] = useState({status:'', projecttype:'', gemeente:'', minWaarde:'', vanaf:''});
  const [toonFilters, setToonFilters] = useState(false);
  const [drag, setDrag] = useState({id:null, fiche:null});
  const [focusId, setFocusId] = useState(null);
  const [scrollNonce, setScrollNonce] = useState(0);
  const [undoStack, setUndoStack] = useState([]);
  const importRef = useRef(null);

  const snapshot = ()=> setUndoStack(s => [...s.slice(-24), fiches]);
  function undo(){
    setUndoStack(s => {
      if(s.length===0) return s;
      setFiches(s[s.length-1]);
      setModal(null);
      return s.slice(0,-1);
    });
  }

  useEffect(()=>{ storage.set(LS_KEY, JSON.stringify(fiches)); }, [fiches]);

  const zoekActief = zoek.trim().length>0;
  const matchIds = useMemo(()=>{
    const q = zoek.trim().toLowerCase(); const set = new Set();
    if(!q) return set;
    for(const f of fiches){
      const hb = [f.naam,f.bedrijf,f.adres,f.postcode,f.gemeente,f.email,f.telefoon,f.projecttype,f.status,f.fichenummer,String(f.waarde||'')].join(' ').toLowerCase();
      if(hb.includes(q)) set.add(f.id);
    }
    return set;
  }, [zoek, fiches]);
  const firstMatchId = useMemo(()=>{ if(!zoekActief) return null; const m = fiches.find(f => matchIds.has(f.id)); return m?m.id:null; }, [zoekActief, matchIds, fiches]);

  const gefilterd = useMemo(()=> fiches.filter(f=>{
    if(filters.status && f.status!==filters.status) return false;
    if(filters.projecttype && f.projecttype!==filters.projecttype) return false;
    if(filters.gemeente && !(f.gemeente||'').toLowerCase().includes(filters.gemeente.toLowerCase())) return false;
    if(filters.minWaarde && (Number(f.waarde)||0) < Number(filters.minWaarde)) return false;
    if(filters.vanaf && (f.datumAanvraag||'') < filters.vanaf) return false;
    return true;
  }), [fiches, filters]);
  const perBak = (bakId) => gefilterd.filter(f => (f.bak||'nieuw')===bakId);

  const tellingen = useMemo(()=>{ const t={}; STATUSSEN.forEach(s=> t[s.id]=0); fiches.forEach(f=>{ if(t[f.status]!==undefined) t[f.status]++; }); return t; }, [fiches]);
  const totaleWaarde = fiches.reduce((s,f)=> s+(Number(f.waarde)||0), 0);

  // Omzet & winst per jaar (op basis van het jaartal in het fichenummer, anders de aanvraagdatum)
  const perJaar = useMemo(()=>{
    const m={};
    fiches.forEach(f=>{ const j=ficheJaar(f); const r=rendement(f); if(!m[j]) m[j]={jaar:j, aantal:0, omzet:0, winst:0}; m[j].aantal++; m[j].omzet+=r.omzet; m[j].winst+=r.winst; });
    return Object.values(m).sort((a,b)=> String(b.jaar).localeCompare(String(a.jaar)));
  }, [fiches]);

  function opslaan(fiche){
    const nr = (fiche.fichenummer||'').trim();
    if(nr && fiches.some(x => x.id!==fiche.id && (x.fichenummer||'').trim()===nr)){
      alert('Fichenummer "'+nr+'" bestaat al bij een andere fiche. Kies een uniek nummer.');
      return;
    }
    snapshot();
    setFiches(prev=>{ const bestaat=prev.some(x=>x.id===fiche.id); return bestaat?prev.map(x=>x.id===fiche.id?fiche:x):[...prev,fiche]; });
    setModal(null);
  }
  function verwijder(id){ if(!window.confirm('Deze fiche definitief verwijderen? (kan hersteld worden met “Ongedaan maken”)')) return; snapshot(); setFiches(prev=>prev.filter(x=>x.id!==id)); setModal(null); }
  function nieuweFiche(){
    const jaar = String(new Date().getFullYear());
    let maxSeq = 0;
    fiches.forEach(f=>{ const s=ficheSeq(f.fichenummer); if(s && s.jaar===jaar && s.seq>maxSeq) maxSeq=s.seq; });
    const nummer = jaar + '-' + String(maxSeq+1).padStart(3,'0');
    setModal({...LEEG_FICHE(), fichenummer:nummer});
  }
  function openFiche(f){ setFocusId(null); setModal({...f, __bestaat:true}); }
  function toonInBak(f){ setZoek(''); setFocusId(f.id); setScrollNonce(n=>n+1); }
  function zoekWijzig(v){ setZoek(v); setFocusId(null); }

  const dragStart = (e,f)=>{ setDrag({id:f.id, fiche:f}); e.dataTransfer.effectAllowed='move'; };
  const dragEnd = ()=> setDrag({id:null, fiche:null});
  function dropInBak(bakId){ if(!drag.id) return; snapshot(); setFiches(prev=>prev.map(f=> f.id===drag.id ? {...f, bak:bakId} : f)); setDrag({id:null, fiche:null}); }

  function exporteer(){ const blob=new Blob(['\ufeff'+toCSV(fiches)],{type:'text/csv;charset=utf-8;'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='betechsmart-fiches-'+vandaag()+'.csv'; a.click(); URL.revokeObjectURL(url); }
  function importeer(e){
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const rows=parseCSV(ev.target.result);
      if(rows.length<2){ alert('Geen data gevonden in CSV.'); return; }
      const kop=rows[0].map(h=>h.trim().toLowerCase()); const idx=(n)=>kop.indexOf(n);
      const nieuwe=rows.slice(1).map(r=>{
        const g=(n)=>{ const i=idx(n); return i>=0?(r[i]||'').trim():''; };
        const status = g('status') && STATUS_MAP[g('status')] ? g('status') : 'Nieuwe aanvraag';
        return { ...LEEG_FICHE(), id:uid(),
          fichenummer:g('fichenummer'), naam:g('naam'), bedrijf:g('bedrijf'), adres:g('adres'),
          postcode:g('postcode'), gemeente:g('gemeente'), email:g('email'), telefoon:g('telefoon'),
          datumAanvraag: parseNlDatum(g('datumaanvraag')) || vandaag(), datumShowroom: parseNlDatum(g('datumshowroom')),
          bron:g('bron')||'mail', typeKlant:g('typeklant')||'particulier', projecttype:g('projecttype')||'KNX',
          waarde:g('waarde'),
          status, bak: g('bak') || bakVoorStatus(status),
          volgendeActie:g('volgendeactie'), datumVolgendeActie:parseNlDatum(g('datumvolgendeactie')),
          reclamebord: /^(1|ja|true|x)$/i.test(g('reclamebord')), googleReview: /^(1|ja|true|x)$/i.test(g('googlereview')),
          notities:g('notities'), historiek:[], documenten:[], aanpassingen:[] };
      });
      setFiches(prev=>{ setUndoStack(s=>[...s.slice(-24), prev]); return [...prev, ...nieuwe]; }); alert(nieuwe.length+' fiche(s) geïmporteerd.');
    };
    reader.readAsText(file,'utf-8'); e.target.value='';
  }

  const filtersActief = Object.values(filters).some(Boolean);
  const wisFilters = ()=> setFilters({status:'',projecttype:'',gemeente:'',minWaarde:'',vanaf:''});

  return (
    <div className="min-h-screen">
      <header className="sticky top-0 z-40 bg-bts-ink/95 backdrop-blur border-b border-bts-line">
        <div className="max-w-[1600px] mx-auto px-4 py-3 flex items-center gap-3 flex-wrap">
          <div className="flex items-center gap-2.5">
            <Logo/>
            <div><div className="font-display font-bold text-white leading-none">BeTechSmart</div><div className="text-[11px] text-bts-orange -mt-0.5 tracking-wide">FICHENBAK</div></div>
          </div>
          <div className="flex-1 min-w-[220px] max-w-2xl relative">
            <input value={zoek} onChange={e=>zoekWijzig(e.target.value)} placeholder="Zoek op naam, adres, e-mail, telefoon, postcode, projecttype, bedrag…"
              className="w-full bg-bts-panel2 border border-bts-line rounded-xl pl-10 pr-9 py-2.5 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-bts-orange/60" />
            <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500">🔍</span>
            {zoek && <button onClick={()=>zoekWijzig('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white">✕</button>}
            {zoekActief && <div className="absolute -bottom-6 left-1 text-[11px] text-bts-orange">{matchIds.size} fiche(s) komen omhoog</div>}
          </div>
          <div className="flex items-center gap-2 ml-auto">
            <button onClick={undo} disabled={!undoStack.length} title="Laatste wijziging herstellen"
              className={"px-3 py-2 rounded-lg border text-sm "+(undoStack.length?'border-bts-line text-slate-200 hover:border-bts-orange':'border-bts-line text-slate-600 cursor-not-allowed')}>↶ Ongedaan{undoStack.length?' ('+undoStack.length+')':''}</button>
            <button onClick={()=>setToonFilters(v=>!v)} className={"px-3 py-2 rounded-lg border text-sm "+(filtersActief?'border-bts-orange text-bts-orange':'border-bts-line text-slate-300 hover:bg-bts-panel2')}>⚙ Filters {filtersActief && '•'}</button>
            <button onClick={nieuweFiche} className="px-4 py-2 rounded-lg bg-bts-orange text-bts-ink font-semibold text-sm hover:bg-bts-orangeDark">+ Nieuwe fiche</button>
          </div>
        </div>

        {toonFilters &&
          <div className="border-t border-bts-line bg-bts-panel">
            <div className="max-w-[1600px] mx-auto px-4 py-3 flex flex-wrap gap-2 items-end">
              <label className="text-xs text-slate-400">Status<select className={inputCls+' mt-1 py-1.5'} value={filters.status} onChange={e=>setFilters({...filters,status:e.target.value})}><option value="">alle</option>{STATUSSEN.map(s=><option key={s.id}>{s.id}</option>)}</select></label>
              <label className="text-xs text-slate-400">Projecttype<select className={inputCls+' mt-1 py-1.5'} value={filters.projecttype} onChange={e=>setFilters({...filters,projecttype:e.target.value})}><option value="">alle</option>{PROJECTTYPES.map(t=><option key={t}>{t}</option>)}</select></label>
              <label className="text-xs text-slate-400">Gemeente<input className={inputCls+' mt-1 py-1.5'} value={filters.gemeente} onChange={e=>setFilters({...filters,gemeente:e.target.value})} placeholder="bv. Gent" /></label>
              <label className="text-xs text-slate-400">Min. bedrag €<input type="number" className={inputCls+' mt-1 py-1.5 w-28'} value={filters.minWaarde} onChange={e=>setFilters({...filters,minWaarde:e.target.value})} /></label>
              <label className="text-xs text-slate-400">Aanvraag vanaf<input type="date" className={inputCls+' mt-1 py-1.5'} value={filters.vanaf} onChange={e=>setFilters({...filters,vanaf:e.target.value})} /></label>
              {filtersActief && <button onClick={wisFilters} className="px-3 py-1.5 rounded-lg border border-bts-line text-slate-300 hover:bg-bts-panel2 text-sm">Wis filters</button>}
            </div>
          </div>}
      </header>

      <main className="max-w-[1600px] mx-auto px-4 py-5">
        <div className="grid lg:grid-cols-[1fr_340px] gap-4 mb-5">
          <div className="bg-bts-panel border border-bts-line rounded-2xl p-4">
            <div className="flex items-center justify-between mb-1">
              <h3 className="font-display font-bold text-white">Dashboard</h3>
              <div className="text-xs text-slate-400">{fiches.length} fiches · pijplijn <b className="text-bts-orange">{euro(totaleWaarde)}</b></div>
            </div>
            <p className="text-[11px] text-slate-500 mb-3">Klik een tegel om enkel die status te tonen. Slepen doe je tussen de bakken hieronder.</p>
            <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-2">
              {STATUSSEN.map(s=>(
                <StatCard key={s.id} label={s.id} value={tellingen[s.id]} hex={KLEUREN[s.kleur].hex}
                  active={filters.status===s.id}
                  onClick={()=> setFilters({...filters, status: filters.status===s.id?'':s.id})} />
              ))}
            </div>
            <div className="flex flex-wrap gap-3 mt-3 pt-3 border-t border-bts-line">
              {Object.entries(KLEUREN).map(([k,v])=>(<span key={k} className="flex items-center gap-1.5 text-[11px] text-slate-400"><span style={{width:9,height:9,background:v.hex}} className="rounded-full" /> {v.naam}</span>))}
            </div>

            {/* Omzet & winst per jaar */}
            <div className="mt-3 pt-3 border-t border-bts-line">
              <div className="text-[11px] font-semibold text-slate-400 uppercase tracking-wide mb-2">Omzet &amp; winst per jaar</div>
              <div className="flex flex-wrap gap-2">
                {perJaar.map(j=>(
                  <div key={j.jaar} className="rounded-lg bg-bts-panel2 border border-bts-line px-3 py-2 min-w-[150px]">
                    <div className="flex items-baseline justify-between">
                      <span className="font-display font-bold text-white">{j.jaar}</span>
                      <span className="text-[10px] text-slate-500">{j.aantal} fiches</span>
                    </div>
                    <div className="text-[11px] text-slate-400 mt-0.5">Omzet <b className="text-slate-200">{euro(j.omzet)}</b></div>
                    <div className="text-[11px] text-slate-400">Winst <b style={{color:(j.winst>=0?'#4ade80':'#f87171')}}>{euro(j.winst)}</b></div>
                  </div>
                ))}
                {perJaar.length===0 && <span className="text-sm text-slate-500">Nog geen data.</span>}
              </div>
            </div>
          </div>
          <VandaagPaneel fiches={fiches} onToonInBak={toonInBak} onOpen={openFiche} />
        </div>

        {/* Actieve filter — "terug"-balk */}
        {filtersActief &&
          <div className="mb-3 flex items-center gap-2 flex-wrap bg-bts-panel border border-bts-orange/50 rounded-xl px-3 py-2">
            <span className="text-sm text-slate-300">Filter actief:</span>
            {filters.status && <span className="text-xs px-2 py-1 rounded-full bg-bts-orange/15 text-bts-orange">Status: {filters.status}</span>}
            {filters.projecttype && <span className="text-xs px-2 py-1 rounded-full bg-bts-orange/15 text-bts-orange">Type: {filters.projecttype}</span>}
            {filters.gemeente && <span className="text-xs px-2 py-1 rounded-full bg-bts-orange/15 text-bts-orange">Gemeente: {filters.gemeente}</span>}
            {filters.minWaarde && <span className="text-xs px-2 py-1 rounded-full bg-bts-orange/15 text-bts-orange">≥ {euro(filters.minWaarde)}</span>}
            {filters.vanaf && <span className="text-xs px-2 py-1 rounded-full bg-bts-orange/15 text-bts-orange">Vanaf {toonDatum(filters.vanaf)}</span>}
            <button onClick={wisFilters} className="ml-auto px-3 py-1.5 rounded-lg bg-bts-orange text-bts-ink font-semibold text-sm hover:bg-bts-orangeDark">✕ Toon alle fiches</button>
          </div>}

        <div className="grid md:grid-cols-3 gap-4">
          {BAKKEN.map(bak=>(
            <Bak key={bak.id} bak={bak} fiches={perBak(bak.id)} matchIds={matchIds} zoekActief={zoekActief}
              focusId={focusId} firstMatchId={firstMatchId} scrollNonce={scrollNonce}
              onOpen={openFiche} onDropFiche={dropInBak} drag={{id:drag.id, start:dragStart, end:dragEnd}} />
          ))}
        </div>

        <div className="mt-6 flex flex-wrap items-center gap-3 text-sm">
          <span className="text-slate-400">Data:</span>
          <button onClick={exporteer} className="px-3 py-1.5 rounded-lg border border-bts-line text-slate-300 hover:border-bts-orange">⬇ Exporteer CSV</button>
          <button onClick={()=>importRef.current.click()} className="px-3 py-1.5 rounded-lg border border-bts-line text-slate-300 hover:border-bts-orange">⬆ Importeer CSV/Excel</button>
          <input ref={importRef} type="file" accept=".csv,text/csv" className="hidden" onChange={importeer} />
          <span className={"ml-auto text-[11px] px-2 py-1 rounded-full "+(storage.persistent?'bg-bts-orange/15 text-bts-orange':'bg-yellow-500/15 text-yellow-400')}>{storage.persistent ? '● Opgeslagen in deze browser (localStorage)' : '○ Tijdelijke opslag (open lokaal voor blijvende opslag)'}</span>
        </div>

        <footer className="mt-8 text-center text-[11px] text-slate-600">BeTechSmart Fichenbak · v1 · lokale opslag · klaar voor uitbreiding naar Supabase, Billit, Wix & e-mail</footer>
      </main>

      {modal && <FicheModal fiche={modal} onClose={()=>setModal(null)} onSave={opslaan} onDelete={verwijder} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
